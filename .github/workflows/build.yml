name: Build PvPBot 1.21.1

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pvpbot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build mod
        run: ./gradlew build --no-daemon --no-build-cache --refresh-dependencies

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: pvpbot-1.21.1-${{ github.sha }}
          path: pvpbot/build/libs/*.jar
          if-no-files-found: error
